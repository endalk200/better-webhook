version: 2

project_name: bw

builds:
  - id: bw
    dir: ./apps/cli
    main: .
    binary: bw
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X github.com/endalk200/better-webhook/apps/cli/internal/version.Version={{ .Env.CLI_RELEASE_VERSION }}
      - -X github.com/endalk200/better-webhook/apps/cli/internal/version.Commit={{ .Commit }}
      - -X github.com/endalk200/better-webhook/apps/cli/internal/version.Date={{ .Date }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: cli-archives
    ids:
      - bw
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    wrap_in_directory: false
    name_template: >-
      bw-{{ .Os }}-{{ if eq .Arch "amd64" }}x64{{ else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive
    ids:
      - cli-archives

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - --yes
      - --bundle=${signature}
      - ${artifact}
    artifacts: checksum

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: endalk200
    name: better-webhook
  disable: true
