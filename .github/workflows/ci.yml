name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Format, Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Devbox
        uses: ./.github/actions/setup-devbox

      - name: Install dependencies
        run: devbox run -- pnpm install --frozen-lockfile

      - name: CLI release script tests
        run: devbox run -- pnpm run test:cli-release

      - name: Format check
        run: |
          devbox run -- pnpm run format:check

      - name: CLI format check
        run: devbox run -- just cli-format-check

      - name: Lint
        run: devbox run -- pnpm run lint

      - name: CLI lint
        run: devbox run -- just cli-lint

      - name: Type check
        run: devbox run -- pnpm run check-types

      - name: Test
        run: devbox run -- pnpm run test

      - name: CLI test
        run: devbox run -- just cli-test

      - name: Build
        run: devbox run -- pnpm run build

      - name: CLI build
        run: devbox run -- just cli-build
