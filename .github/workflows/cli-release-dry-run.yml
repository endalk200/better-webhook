name: CLI Release Dry Run

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dry-run:
    name: Validate CLI release packaging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Devbox
        uses: ./.github/actions/setup-devbox

      - name: Install dependencies
        run: devbox run -- bun install --frozen-lockfile --ignore-scripts

      - name: Format check
        run: devbox run -- bun run --filter @better-webhook/cli format:check

      - name: Lint
        run: devbox run -- bun run --filter @better-webhook/cli lint

      - name: Type check
        run: devbox run -- bun run --filter @better-webhook/cli check-types

      - name: Test
        run: devbox run -- bun run --filter @better-webhook/cli test

      - name: Build CLI package
        run: devbox run -- bun run --filter @better-webhook/cli build

      - name: Generate npm package directories
        run: devbox run -- bun run --filter @better-webhook/cli release:package-npm

      - name: Pack npm package
        run: devbox run -- npm pack packages/cli/dist/npm/cli --dry-run
