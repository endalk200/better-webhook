name: CLI Release Dry Run

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dry-run:
    name: Validate CLI release packaging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Devbox
        uses: ./.github/actions/setup-devbox

      - name: Install dependencies
        run: devbox run -- bun install --frozen-lockfile --ignore-scripts

      - name: Format check
        run: devbox run -- bun --filter @better-webhook/cli run format:check

      - name: Lint
        run: devbox run -- bun --filter @better-webhook/cli run lint

      - name: Type check
        run: devbox run -- bun --filter @better-webhook/cli run check-types

      - name: Test
        run: devbox run -- bun --filter @better-webhook/cli run test

      - name: Build CLI package
        run: devbox run -- bun --filter @better-webhook/cli run build

      - name: Generate npm package directories
        run: devbox run -- bun --filter @better-webhook/cli run release:package-npm -- dist

      - name: Pack npm packages
        working-directory: packages/cli/dist/npm/cli
        run: devbox run -- npm pack --dry-run
