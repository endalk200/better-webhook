name: Release CLI

on:
  push:
    tags:
      - "cli/v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Publish CLI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Devbox
        uses: ./.github/actions/setup-devbox
        with:
          enable-cache: "false"

      - name: Configure npm registry
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: devbox run -- bun install --frozen-lockfile --ignore-scripts

      - name: Validate release tag and npm availability
        run: devbox run -- bun --filter @better-webhook/cli run release:check

      - name: Format check
        run: devbox run -- bun --filter @better-webhook/cli run format:check

      - name: Lint
        run: devbox run -- bun --filter @better-webhook/cli run lint

      - name: Type check
        run: devbox run -- bun --filter @better-webhook/cli run check-types

      - name: Test
        run: devbox run -- bun --filter @better-webhook/cli run test

      - name: Build CLI package
        run: devbox run -- bun --filter @better-webhook/cli run build

      - name: Generate npm package directories
        run: devbox run -- bun --filter @better-webhook/cli run release:package-npm -- dist

      - name: Pack npm package for GitHub Release
        run: devbox run -- sh -c "cd packages/cli/dist/npm/cli && npm pack --ignore-scripts"

      - name: Publish GitHub Release artifact
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          release_flags=(--repo "$GITHUB_REPOSITORY" --verify-tag --title "CLI v${VERSION}" --generate-notes)
          if [[ "$VERSION" == *-* ]]; then
            release_flags+=(--prerelease)
          fi
          if devbox run -- gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            devbox run -- gh release upload "$GITHUB_REF_NAME" packages/cli/dist/npm/cli/*.tgz --repo "$GITHUB_REPOSITORY" --clobber
          else
            devbox run -- gh release create "$GITHUB_REF_NAME" packages/cli/dist/npm/cli/*.tgz "${release_flags[@]}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve npm dist-tag
        id: npm-tag
        working-directory: packages/cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish npm package
        run: devbox run -- sh -c "cd packages/cli/dist/npm/cli && npm publish --provenance --access public --tag '${{ steps.npm-tag.outputs.tag }}'"
