name: Release CLI

on:
  push:
    tags:
      - "cli/v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Publish CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Devbox
        uses: ./.github/actions/setup-devbox

      - name: Configure npm registry
        uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: devbox run -- pnpm install --frozen-lockfile

      - name: Validate release tag and npm availability
        run: devbox run -- pnpm --filter @better-webhook/cli run release:check

      - name: Format check
        run: devbox run -- pnpm --filter @better-webhook/cli run format:check

      - name: Lint
        run: devbox run -- pnpm --filter @better-webhook/cli run lint

      - name: Type check
        run: devbox run -- pnpm --filter @better-webhook/cli run check-types

      - name: Test
        run: devbox run -- pnpm --filter @better-webhook/cli run test

      - name: GoReleaser build artifacts
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          devbox run -- sh -c "cd packages/cli && GORELEASER_CURRENT_TAG=v${VERSION} goreleaser release --clean --skip=publish,validate"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release artifacts
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          release_flags=(--repo "$GITHUB_REPOSITORY" --verify-tag --title "CLI v${VERSION}" --generate-notes)
          if [[ "$VERSION" == *-* ]]; then
            release_flags+=(--prerelease)
          fi
          if devbox run -- gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            devbox run -- gh release upload "$GITHUB_REF_NAME" packages/cli/dist/bw_${VERSION}_* --repo "$GITHUB_REPOSITORY" --clobber
          else
            devbox run -- gh release create "$GITHUB_REF_NAME" packages/cli/dist/bw_${VERSION}_* "${release_flags[@]}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate npm package directories
        run: devbox run -- pnpm --filter @better-webhook/cli run release:package-npm -- dist

      - name: Resolve npm dist-tag
        id: npm-tag
        working-directory: packages/cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish platform packages
        run: |
          for package_dir in cli-darwin-arm64 cli-darwin-x64 cli-linux-arm64 cli-linux-x64 cli-win32-x64; do
            devbox run -- sh -c "cd packages/cli/dist/npm/$package_dir && npm publish --provenance --access public --tag '${{ steps.npm-tag.outputs.tag }}'"
          done

      - name: Publish wrapper package
        run: devbox run -- sh -c "cd packages/cli/dist/npm/cli && npm publish --provenance --access public --tag '${{ steps.npm-tag.outputs.tag }}'"
