name: Release SDK Packages

on:
  push:
    branches: [main]
    paths:
      - ".changeset/**"
      - "packages/core/**"
      - "packages/express/**"
      - "packages/github/**"
      - "packages/nextjs/**"
      - "packages/otel/**"
      - "packages/stripe/**"
      - "package.json"
      - "bun.lock"
      - "justfile"
      - ".github/workflows/release.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish SDK packages via changesets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Devbox
        uses: ./.github/actions/setup-devbox
        with:
          enable-cache: "false"

      - name: Configure npm registry auth
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: devbox run -- bun install --frozen-lockfile --ignore-scripts

      - name: Trivy release gate
        if: ${{ vars.TRIVY_ENFORCE == '1' }}
        run: devbox run -- just security-scan-blocking

      - name: Trivy release report
        if: ${{ vars.TRIVY_ENFORCE != '1' }}
        run: devbox run -- just security-scan

      - name: Format check
        run: devbox run -- bun run format:check

      - name: Lint
        run: devbox run -- bun run lint

      - name: Type check
        run: devbox run -- bun run check-types

      - name: Test
        run: devbox run -- bun run test

      - name: Build packages
        run: devbox run -- bun run build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: devbox run -- bun run release:publish
          title: "chore: release packages"
          commit: "chore: release packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tags
        if: steps.changesets.outputs.published == 'true'
        run: git push --tags
